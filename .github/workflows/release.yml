# Publish pygeomatic to PyPI when a version tag (v*) is pushed.
#
# Release procedure:
#   1. Bump `version` in pyproject.toml on main.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag must match pyproject.toml's version exactly — content repos pin
# `pygeomatic-ref` to the same tag Nova installs from PyPI, so a mismatch
# would let preview and published output drift.
#
# Publishing uses PyPI Trusted Publishing (OIDC): no API token is stored.
# PyPI must have a trusted publisher configured for this repo + workflow
# + the `pypi` environment.

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check tag matches pyproject.toml version
        run: |
          version=$(uv run --no-project python -c \
            "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $version" >&2
            exit 1
          fi

      - name: Run tests
        run: |
          uv sync
          uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pygeomatic
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
